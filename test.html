<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Fireflies Drift</title>
<style>
  body { margin:0; background: #000003; overflow:hidden; } /* dark bluish background */
  canvas { display:block; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

// Firefly sizes
const FIRELY_SIZES = [1, 3, 5]; // small, medium, large

class Firefly {
  constructor() {
    this.x = Math.random() * width;
    this.y = Math.random() * height;
    this.vx = (Math.random()-0.5)*0.5;
    this.vy = (Math.random()-0.5)*0.5;
    this.phase = Math.random() * Math.PI*2; // blinking offset
    this.speed = 0.02 + Math.random()*0.03;
    this.glowOffset = Math.random()*Math.PI*2; // for glow pulse
    this.size = FIRELY_SIZES[Math.floor(Math.random()*FIRELY_SIZES.length)];
  }
  
  update() {
    // Random wandering
    this.vx += (Math.random()-0.5)*0.05;
    this.vy += (Math.random()-0.5)*0.05;
    
    // Border pull
    const margin = 50;
    if(this.x < margin) this.vx += 0.05;
    if(this.x > width-margin) this.vx -= 0.05;
    if(this.y < margin) this.vy += 0.05;
    if(this.y > height-margin) this.vy -= 0.05;
    
    // Move
    this.x += this.vx;
    this.y += this.vy;
    
    // Limit speed
    const maxSpeed = 1.5;
    this.vx = Math.max(Math.min(this.vx, maxSpeed), -maxSpeed);
    this.vy = Math.max(Math.min(this.vy, maxSpeed), -maxSpeed);
  }
  
  draw(ctx, time) {
    // Soft blinking with random glow
    const brightness = Math.sin(time*this.speed + this.phase)*0.5 + 0.5; // 0-1
    const glow = this.size*4 + Math.sin(time*2 + this.glowOffset)*2; // glow pulse
    
    // Glow effect
    ctx.beginPath();
    ctx.arc(this.x, this.y, glow, 0, Math.PI*2);
    ctx.fillStyle = `rgba(0,150,255,${0.2*brightness})`;
    ctx.fill();
    
    // Firefly core
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(0,200,255,${brightness})`;
    ctx.fill();
  }
}

const fireflies = [];
for(let i=0;i<16;i++) fireflies.push(new Firefly());

function animate(time){
  time *= 0.001; // convert ms to seconds
  
  // Clear background (no trails)
  ctx.clearRect(0,0,width,height);
  
  fireflies.forEach(f => {
    f.update();
    f.draw(ctx, time);
  });
  
  requestAnimationFrame(animate);
}

animate(0);

// Handle resize
window.addEventListener('resize', ()=>{
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
});
</script>
</body>
</html>
